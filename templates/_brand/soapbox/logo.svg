<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1e2c24"/>
      <stop offset="1" stop-color="#121a15"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1aa863"/>
      <stop offset="1" stop-color="#0c6c3d"/>
    </linearGradient>
  </defs>
  <!-- Dark background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- Green tile -->
  <rect x="18" y="18" width="64" height="64" rx="14" fill="url(#tile)"/>
  <!-- Shine overlay -->
  <rect x="18" y="18" width="64" height="64" rx="14" fill="url(#shine)"/>
  <!-- S letter -->
  <text x="50" y="69" text-anchor="middle" font-family="'Bricolage Grotesque', 'Georgia', serif" font-weight="800" font-size="52" fill="#fff">S</text>
</svg>
